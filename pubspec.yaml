name: brainflow
description: "Brain App - ADHD wellness and cognitive training application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  flip_card: ^0.7.0
  flutter_staggered_grid_view: ^0.7.0

  # Media
  audioplayers: ^5.2.1
  video_player: ^2.8.6

  # Forms
  country_code_picker: ^3.0.0
  flutter_rating_bar: ^4.0.1

  # State management
  flutter_bloc: ^9.0.0
  equatable: ^2.0.7

  # Dependency injection
  get_it: ^8.0.0

  # Networking
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0
  connectivity_plus: ^6.1.1

  # Error handling
  dartz: ^0.10.1

  # Local storage
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2

  # Error tracking
  sentry_flutter: ^8.14.0

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/app_logos/app_logo.jpg
    - assets/tutorials/
    - assets/tutorials/app_intro/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_logo/app_logo.jpg"